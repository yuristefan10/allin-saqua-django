{% extends 'portal/base.html' %}
{% block title %}Cadastro — ALL IN SAQUA{% endblock %}

{% block content %}
<div class="container page-content form-page">
    <div class="form-card">
        <h1>Criar Conta</h1>
        <form method="post">
            {% csrf_token %}
            {% for field in form %}
            <div class="form-group">
                <label for="{{ field.id_for_label }}">{{ field.label }}</label>
                {{ field }}
                {% if field.errors %}<p class="field-error">{{ field.errors.0 }}</p>{% endif %}
            </div>
            {% endfor %}
            <button type="submit" class="botao botao-grande botao-block">Cadastrar</button>
        </form>
        <p class="form-footer">Já tem conta? <a href="{% url 'login' %}">Faça login</a></p>
    </div>
</div>
{% endblock %}
