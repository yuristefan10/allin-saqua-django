[phases.setup]
nixPkgs = ["python312", "python312Packages.pip"]

[phases.build]
cmds = [
  "pip install -r requirements.txt",
  "python manage.py collectstatic --noinput"
]

[start]
cmd = "python manage.py migrate --noinput && gunicorn allin_django.wsgi --bind 0.0.0.0:$PORT --workers 2 --log-file -"
